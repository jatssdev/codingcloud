<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3 {
            box-shadow: 0 3px 10px rgb(236, 236, 236);
            margin: 10px;
            padding: 10px;
        }
    </style>

</head>

<body>

    <h1>Users</h1>


    <div id="wrapper">

    </div>

    <script>
        let getAllUsers = async () => {
            let response = await fetch('http://localhost:8000/users')
            let data = await response.json()
            console.log(data)
            wrapper.innerHTML = data.map((x) => {
                return `<h3>${x}</h3>`
            }).join('')
        }
        getAllUsers()
    </script>
</body>

</html>
